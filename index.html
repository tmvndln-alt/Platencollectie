<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Platen">
<title>🎵 Platencollectie</title>
<style>
:root {
  --bg: #080808;
  --surface: #111114;
  --surface2: #1a1a1f;
  --border: #222228;
  --rood: #c0392b;
  --rood2: #e74c3c;
  --goud: #d4ac0d;
  --wit: #ffffff;
  --grijs: #888;
  --groen: #27ae60;
  --blauw: #2980b9;
  --geel: #e67e22;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: var(--bg); color: var(--wit); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
header { background: var(--surface); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 14px 16px 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo svg { flex-shrink: 0; }
.logo-naam { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-naam span { color: var(--rood); }
.teller-pill { font-size: 12px; color: var(--goud); font-weight: 700; background: rgba(212,172,13,0.12); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(212,172,13,0.25); }

/* ZOEK */
.zoek-wrap { position: relative; margin-bottom: 10px; }
.zoek-input { width: 100%; padding: 11px 42px 11px 42px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; color: var(--wit); font-size: 16px; outline: none; transition: border-color 0.2s; }
.zoek-input:focus { border-color: var(--rood); }
.zoek-input::placeholder { color: #444; }
.zoek-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.zoek-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #333; border: none; color: #aaa; font-size: 13px; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 700; }

/* CHIPS */
.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1.5px solid var(--border); background: transparent; color: var(--grijs); transition: all 0.15s; }
.chip.actief { background: var(--rood); border-color: var(--rood); color: #fff; }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: none; }
.tab { flex: 1; padding: 10px 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #555; border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: 0.2px; }
.tab.actief { color: var(--wit); border-bottom-color: var(--rood); }

/* SCANNER KNOP */
.scan-bar { display: flex; gap: 8px; padding: 10px 0 12px; }
.scan-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; background: var(--rood); border: none; border-radius: 14px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.scan-btn:active { background: #a93226; }
.add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; color: var(--grijs); font-size: 14px; font-weight: 700; cursor: pointer; }

/* MAIN */
main { padding: 8px 12px 90px; }

/* STATS BANNER */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--wit); }
.stat-lbl { font-size: 10px; color: var(--grijs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* PLAAT KAART */
.sectie-hdr { font-size: 11px; font-weight: 800; color: #444; letter-spacing: 1.2px; text-transform: uppercase; padding: 12px 2px 5px; }
.kaart { background: var(--surface); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: all 0.2s; }
.kaart:active { transform: scale(0.985); opacity: 0.9; }
.kaart.open { border-color: var(--rood); box-shadow: 0 0 0 1px var(--rood); }
.kaart-hoofd { display: flex; align-items: center; padding: 12px 14px; gap: 13px; }

/* VINYL SCHIJF */
.vinyl { width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; position: relative; }
.vinyl svg { width: 100%; height: 100%; }

/* INFO */
.plaat-info { flex: 1; min-width: 0; }
.plaat-titel { font-size: 15px; font-weight: 700; color: var(--wit); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.plaat-artiest { font-size: 12px; color: var(--goud); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
.plaat-badges { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
.b-jaar { background: #1e1e24; color: #777; }
.b-formaat { background: rgba(192,57,43,0.18); color: #e74c3c; }
.b-land { background: #1e1e24; color: #666; }

/* STAAT DOT */
.staat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }

/* DETAIL PANEL */
.detail { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.kaart.open .detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.detail-blok { background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
.detail-lbl { font-size: 10px; color: var(--grijs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.detail-val { font-size: 13px; font-weight: 600; color: var(--wit); }
.staat-pill { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.detail-opmerking { background: var(--surface2); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; font-size: 13px; color: #aaa; font-style: italic; }
.verwijder-btn { width: 100%; padding: 9px; background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.3); border-radius: 10px; color: var(--rood2); font-size: 12px; font-weight: 700; cursor: pointer; }

/* LEEG */
.leeg { text-align: center; padding: 60px 20px; color: #444; }
.leeg-icon { font-size: 52px; margin-bottom: 14px; }

/* SCANNER MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; display: none; flex-direction: column; }
.modal-overlay.open { display: flex; }
.scanner-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 10px; }
.scanner-titel { font-size: 18px; font-weight: 700; }
.sluit-btn { background: #222; border: none; color: #aaa; width: 34px; height: 34px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#scannerVideo { width: 100%; flex: 1; object-fit: cover; }
.scanner-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 260px; height: 160px; border: 2px solid var(--rood); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); position: relative; }
.scan-lijn { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--rood); animation: scan 2s ease-in-out infinite; box-shadow: 0 0 8px var(--rood); }
@keyframes scan { 0%,100% { top: 10%; } 50% { top: 90%; } }
.scanner-status { padding: 16px 20px; text-align: center; font-size: 14px; color: #aaa; min-height: 60px; }

/* TOEVOEGEN FORM */
.form-sectie { padding-top: 8px; }
.form-veld { margin-bottom: 12px; }
.form-lbl { display: block; font-size: 11px; font-weight: 700; color: var(--grijs); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-inp { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; color: var(--wit); font-size: 15px; outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
.form-inp:focus { border-color: var(--rood); }
.form-rij { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opslaan-btn { width: 100%; margin-top: 6px; padding: 15px; background: var(--rood); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; transition: background 0.2s; letter-spacing: 0.3px; }
.opslaan-btn:active { background: #a93226; }
.scan-form-btn { width: 100%; margin-bottom: 16px; padding: 13px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; color: var(--wit); font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e1e1e; color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; border: 1px solid #333; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.toast.toon { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="21" fill="#0a0a0a" stroke="#333" stroke-width="1.5"/>
        <circle cx="22" cy="22" r="14" fill="#141414"/>
        <circle cx="22" cy="22" r="8" fill="#0a0a0a"/>
        <circle cx="22" cy="22" r="4" fill="#c0392b"/>
        <circle cx="22" cy="22" r="1.5" fill="#0a0a0a"/>
      </svg>
      <span class="logo-naam">Platen<span>collectie</span></span>
    </div>
    <span class="teller-pill" id="teller">148 platen</span>
  </div>
  <div class="zoek-wrap">
    <span class="zoek-icon">🔍</span>
    <input class="zoek-input" id="zoekInput" placeholder="Zoek artiest of titel…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="zoek-clear" id="zoekClear" onclick="zoekWissen()">✕</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="tabs">
    <button class="tab actief" onclick="toonTab('collectie',this)">🎵 Collectie</button>
    <button class="tab" onclick="toonTab('toevoegen',this)">＋ Toevoegen</button>
  </div>
</header>

<!-- SCANNER MODAL -->
<div class="modal-overlay" id="scannerModal">
  <div class="scanner-header">
    <span class="scanner-titel">📷 Scan barcode</span>
    <button class="sluit-btn" onclick="sluitScanner()">✕</button>
  </div>
  <div style="position:relative;flex:1">
    <video id="scannerVideo" autoplay playsinline muted></video>
    <div class="scanner-overlay">
      <div class="scan-frame"><div class="scan-lijn"></div></div>
    </div>
  </div>
  <div class="scanner-status" id="scannerStatus">Richt de camera op de barcode van de platenhoes</div>
</div>

<main>
  <!-- COLLECTIE TAB -->
  <div id="collectie">
    <div class="stats" id="statsBar"></div>
    <div id="lijst"></div>
  </div>

  <!-- TOEVOEGEN TAB -->
  <div id="toevoegen" style="display:none" class="form-sectie">
    <button class="scan-form-btn" onclick="openScanner()">📷 Scan barcode van platenhoes</button>
    <div class="form-veld" style="margin-bottom:16px">
      <label class="form-lbl">Of zoek op catalogusnummer</label>
      <div style="display:flex;gap:8px">
        <input class="form-inp" id="f_catno" placeholder="bijv. AMLH 63647" style="flex:1">
        <button onclick="zoekOpCatno()" style="padding:12px 16px;background:#1a1a1f;border:1.5px solid #333;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap">🔎 Zoek</button>
      </div>
      <div id="catnoResultaten" style="margin-top:8px"></div>
    </div>
    <div style="border-top:1px solid #222;margin:4px 0 16px;"></div>    <div class="form-rij">
      <div class="form-veld"><label class="form-lbl">Artiest *</label><div style="display:flex;gap:8px"><input class="form-inp" id="f_artiest" placeholder="bijv. Pink Floyd" style="flex:1"><button onclick="zoekOpTitel()" style="padding:0 12px;background:#1a1a1f;border:1.5px solid #333;border-radius:12px;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">🔎 Zoek</button></div></div>
      <div class="form-veld"><label class="form-lbl">Jaar</label><input class="form-inp" id="f_jaar" type="number" placeholder="1979"></div>
    </div>
    <div class="form-veld"><label class="form-lbl">Titel *</label><input class="form-inp" id="f_titel" placeholder="bijv. The Wall"></div>
    <div class="form-rij">
      <div class="form-veld"><label class="form-lbl">Formaat</label>
        <select class="form-inp" id="f_formaat"><option>LP</option><option>2xLP</option><option>EP</option><option>Single (7")</option><option>12" Single</option><option>Maxi-Single</option><option>Box Set</option><option>Overig</option></select>
      </div>
      <div class="form-veld"><label class="form-lbl">Genre</label><input class="form-inp" id="f_genre" placeholder="bijv. Rock"></div>
    </div>
    <div class="form-rij">
      <div class="form-veld"><label class="form-lbl">Staat Vinyl</label>
        <select class="form-inp" id="f_staat_vinyl"><option>Mint (M)</option><option>Near Mint (NM)</option><option selected>Very Good Plus (VG+)</option><option>Very Good (VG)</option><option>Good Plus (G+)</option><option>Good (G)</option><option>Fair (F)</option><option>Poor (P)</option></select>
      </div>
      <div class="form-veld"><label class="form-lbl">Staat Hoes</label>
        <select class="form-inp" id="f_staat_hoes"><option>Mint (M)</option><option>Near Mint (NM)</option><option selected>Very Good Plus (VG+)</option><option>Very Good (VG)</option><option>Good Plus (G+)</option><option>Good (G)</option><option>Fair (F)</option><option>Poor (P)</option></select>
      </div>
    </div>
    <div class="form-rij">
      <div class="form-veld"><label class="form-lbl">Label / Nr.</label><input class="form-inp" id="f_label" placeholder="bijv. EMI / EMC 3223"></div>
      <div class="form-veld"><label class="form-lbl">Land</label><input class="form-inp" id="f_land" placeholder="bijv. UK"></div>
    </div>
    <div class="form-veld"><label class="form-lbl">Barcode</label><input class="form-inp" id="f_barcode" placeholder="5016958060916"></div>
    <div class="form-veld"><label class="form-lbl">Opmerkingen</label><input class="form-inp" id="f_opmerkingen" placeholder="bijv. originele persing"></div>
    <div class="form-veld">
      <label class="form-lbl">Afbeelding URL (van Discogs)</label>
      <input class="form-inp" id="f_afbeelding" placeholder="https://i.discogs.com/...">
      <div style="font-size:11px;color:#555;margin-top:4px">Ga naar discogs.com, zoek je plaat, kopieer de link van de albumhoes</div>
    </div>
    <button class="opslaan-btn" onclick="plaatOpslaan()">💾 Toevoegen aan collectie</button>
  </div>
</main>

<div class="toast" id="toast"></div>

let col = [];
let zoek = "", filter = "", openId = null, huidigTab = "collectie";

function laad(){
  try{const d=localStorage.getItem(STORAGE_KEY);col=d?JSON.parse(d):[...INIT];}
  catch(e){col=[...INIT];}
}
function sla(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(col));}catch(e){}}

function renderStats(){
  const nm = col.filter(p=>p.staat_vinyl==="Near Mint (NM)"||p.staat_vinyl==="Mint (M)").length;
  const vgp = col.filter(p=>p.staat_vinyl==="Very Good Plus (VG+)").length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="stat-num">${col.length}</div><div class="stat-lbl">Platen</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#27ae60">${nm}</div><div class="stat-lbl">NM of beter</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#3498db">${vgp}</div><div class="stat-lbl">VG+</div></div>`;
}

function render(){
  renderStats();
  const q=zoek.toLowerCase();
  const gef=col.filter(p=>{
    const mz=!q||p.artiest.toLowerCase().includes(q)||p.titel.toLowerCase().includes(q)||(p.genre||"").toLowerCase().includes(q);
    const mf=!filter||p.artiest===filter;
    return mz&&mf;
  });

  document.getElementById("teller").textContent=(zoek||filter)?`${gef.length} / ${col.length}`:`${col.length} platen`;

  // Chips — top artiesten
  const tels={};col.forEach(p=>{tels[p.artiest]=(tels[p.artiest]||0)+1;});
  const tops=Object.entries(tels).filter(([,n])=>n>1).sort(([a],[b])=>a.localeCompare(b));
  document.getElementById("chips").innerHTML=
    `<button class="chip${!filter?" actief":""}" onclick="setFilter('')">Alle</button>`+
    tops.map(([a,n],i)=>`<button class="chip${filter===a?" actief":""}" data-idx="${i}" onclick="setFilterBtn(this)">${a.split(" ")[0]} <span style="opacity:.6">${n}</span></button>`).join("");
  document.querySelectorAll("[data-idx]").forEach((btn,i)=>{btn._artiest=tops[i][0];});

  if(!gef.length){
    document.getElementById("lijst").innerHTML=`<div class="leeg"><div class="leeg-icon">🎵</div><p style="font-size:15px">Geen platen gevonden</p></div>`;
    return;
  }

  const groepen={};
  gef.forEach(p=>{if(!groepen[p.artiest])groepen[p.artiest]=[];groepen[p.artiest].push(p);});
  const arr=Object.entries(groepen).sort(([a],[b])=>a.localeCompare(b));

  document.getElementById("lijst").innerHTML=arr.map(([art,platen])=>`
    <div class="sectie-hdr">${art} <span style="color:#333">${platen.length}</span></div>
    ${platen.map(p=>{
      const idx=col.indexOf(p);
      const id="k"+idx;
      const isOpen=openId===id;
      const info=si(p.staat_vinyl);
      return `<div class="kaart${isOpen?" open":""}" id="${id}" onclick="toggle('${id}')">
        <div class="kaart-hoofd">
          <div class="vinyl" style="border-radius:${p.afbeelding?'8px':'50%'};overflow:hidden;background:#0d0d0d">
            ${p.afbeelding
              ? `<img src="${p.afbeelding}" style="width:52px;height:52px;object-fit:cover;border-radius:8px" onerror="this.style.display='none'">`
              : `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="25" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
              <circle cx="26" cy="26" r="19" fill="#141414"/>
              <circle cx="26" cy="26" r="13" fill="#0d0d0d"/>
              <circle cx="26" cy="26" r="7" fill="#161616"/>
              <circle cx="26" cy="26" r="4" fill="${info.k}" opacity="0.9"/>
              <circle cx="26" cy="26" r="1.8" fill="#0d0d0d"/>
            </svg>`}
          </div>
          <div class="plaat-info">
            <div class="plaat-titel">${p.titel}</div>
            <div class="plaat-artiest">${p.artiest}</div>
            <div class="plaat-badges">
              ${p.jaar?`<span class="badge b-jaar">${p.jaar}</span>`:""}
              <span class="badge b-formaat">${p.formaat||"LP"}</span>
              ${p.land?`<span class="badge b-land">${p.land}</span>`:""}
            </div>
          </div>
          <div class="staat-dot" style="background:${info.k};color:${info.k}"></div>
        </div>
        ${isOpen?`<div class="detail">
          ${p.afbeelding?`<div style="margin-bottom:10px;border-radius:12px;overflow:hidden;max-height:200px;text-align:center;background:#0d0d0d">
            <img src="${p.afbeelding}" style="max-width:100%;max-height:200px;object-fit:contain" onerror="this.parentElement.style.display='none'">
          </div>`:""}
          <div class="detail-grid">
            ${p.staat_vinyl?`<div class="detail-blok"><div class="detail-lbl">Staat Vinyl</div><span class="staat-pill" style="color:${si(p.staat_vinyl).k};background:${si(p.staat_vinyl).bg}">${p.staat_vinyl}</span></div>`:""}
            ${p.staat_hoes?`<div class="detail-blok"><div class="detail-lbl">Staat Hoes</div><span class="staat-pill" style="color:${si(p.staat_hoes).k};background:${si(p.staat_hoes).bg}">${p.staat_hoes}</span></div>`:""}
            ${p.label?`<div class="detail-blok"><div class="detail-lbl">Label / Nr.</div><div class="detail-val" style="font-size:12px">${p.label}</div></div>`:""}
            ${p.genre?`<div class="detail-blok"><div class="detail-lbl">Genre</div><div class="detail-val">${p.genre}</div></div>`:""}
            ${p.barcode?`<div class="detail-blok"><div class="detail-lbl">Barcode</div><div class="detail-val" style="font-size:11px;font-family:monospace">${p.barcode}</div></div>`:""}
            ${p.land?`<div class="detail-blok"><div class="detail-lbl">Land</div><div class="detail-val">${p.land}</div></div>`:""}
          </div>
          ${p.opmerkingen?`<div class="detail-opmerking">💬 ${p.opmerkingen}</div>`:""}
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button onclick="event.stopPropagation();zoekWaarde(${idx})" style="flex:1;padding:9px;background:#0d1f2b;border:1px solid #2980b9;border-radius:10px;color:#3498db;font-size:12px;font-weight:700;cursor:pointer">💰 Zoek marktwaarde</button>
          </div>
          <div id="waarde_${idx}" style="display:none;margin-bottom:8px"></div>
          <button class="verwijder-btn" onclick="event.stopPropagation();verwijder(${idx})">🗑 Verwijderen uit collectie</button>
        </div>`:""}
      </div>`;
    }).join("")}
  `).join("");
}

function toggle(id){
  const el=document.getElementById(id);
  if(!el)return;
  if(openId&&openId!==id){const prev=document.getElementById(openId);if(prev)prev.classList.remove("open");}
  el.classList.toggle("open");
  openId=el.classList.contains("open")?id:null;
  render();
  if(openId)setTimeout(()=>el.scrollIntoView({behavior:"smooth",block:"nearest"}),100);
}

function setFilter(a){filter=a;render();}
function setFilterBtn(btn){filter=btn._artiest||"";render();}
function zoekWissen(){document.getElementById("zoekInput").value="";zoek="";document.getElementById("zoekClear").style.display="none";render();}
document.getElementById("zoekInput").addEventListener("input",function(){
  zoek=this.value;filter="";
  document.getElementById("zoekClear").style.display=zoek?"flex":"none";
  render();
});

function toonTab(id,btn){
  document.querySelectorAll("main>div").forEach(d=>d.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("actief"));
  btn.classList.add("actief");
  huidigTab=id;
  if(id==="collectie")render();
}

function plaatOpslaan(){
  const a=document.getElementById("f_artiest").value.trim();
  const t=document.getElementById("f_titel").value.trim();
  if(!a||!t){toonToast("⚠️ Artiest en titel zijn verplicht");return;}
  col.push({
    artiest:a,titel:t,
    jaar:parseInt(document.getElementById("f_jaar").value)||null,
    label:document.getElementById("f_label").value.trim(),
    barcode:document.getElementById("f_barcode").value.trim(),
    staat_vinyl:document.getElementById("f_staat_vinyl").value,
    staat_hoes:document.getElementById("f_staat_hoes").value,
    formaat:document.getElementById("f_formaat").value,
    genre:document.getElementById("f_genre").value.trim(),
    land:document.getElementById("f_land").value.trim(),
    opmerkingen:document.getElementById("f_opmerkingen").value.trim(),
  });
  sla();
  toonToast("✅ "+a+" — "+t+" toegevoegd!");
  ["f_artiest","f_titel","f_jaar","f_label","f_barcode","f_genre","f_land","f_opmerkingen","f_afbeelding"].forEach(id=>document.getElementById(id).value="");
  document.querySelector('.tab[onclick*="collectie"]').click();
}

function verwijder(idx){
  if(!confirm(`Verwijder "${col[idx].artiest} — ${col[idx].titel}"?`))return;
  col.splice(idx,1);sla();openId=null;
  toonToast("🗑 Plaat verwijderd");render();
}

let scannerStream = null;

async function openScanner(){
  document.getElementById("scannerModal").classList.add("open");
  document.getElementById("scannerStatus").textContent = "Camera starten…";
  try {
    if(typeof ZXing === "undefined"){
      document.getElementById("scannerStatus").textContent = "⚠️ Scanner kon niet laden. Vul barcode handmatig in.";
      return;
    }
    codeReader = new ZXing.BrowserBarcodeReader();
    const videoEl = document.getElementById("scannerVideo");
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    scannerStream = stream;
    videoEl.srcObject = stream;
    document.getElementById("scannerStatus").textContent = "Richt op de barcode…";
    codeReader.decodeFromVideoElement(videoEl, (result, err) => {
      if(result){
        const barcode = result.getText();
        sluitScanner();
        zoekDiscogs(barcode);
      }
    });
  } catch(e){
    document.getElementById("scannerStatus").textContent = "⚠️ Geen cameratoegang. Geef toestemming in Safari-instellingen.";
  }
}

function sluitScanner(){
  document.getElementById("scannerModal").classList.remove("open");
  if(codeReader){try{codeReader.reset();}catch(e){}}
  if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());}
  codeReader=null;scannerStream=null;
}

async function zoekDiscogs(barcode){
  toonToast("🔍 Barcode gevonden: "+barcode+"…");
  document.getElementById("f_barcode").value = barcode;
  document.querySelector('.tab[onclick*="toevoegen"]').click();
  try{
    const url = `https://api.discogs.com/database/search?barcode=${barcode}&token=undefined`;
    const resp = await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://api.discogs.com/database/search?barcode=${barcode}`)}`);
    if(!resp.ok) throw new Error();
    const data = await resp.json();
    if(data.results && data.results.length > 0){
      const r = data.results[0];
      const artiest = r.title ? r.title.split(" - ")[0] : "";
      const titel = r.title ? r.title.split(" - ").slice(1).join(" - ") : "";
      const jaar = r.year || "";
      const genre = r.genre ? r.genre[0] : "";
      const formaat = r.format ? r.format[0] : "LP";
      const land = r.country || "";
      if(artiest) document.getElementById("f_artiest").value = artiest;
      if(titel) document.getElementById("f_titel").value = titel;
      if(jaar) document.getElementById("f_jaar").value = jaar;
      if(genre) document.getElementById("f_genre").value = genre;
      if(land) document.getElementById("f_land").value = land;
      toonToast("✅ Gegevens gevonden via Discogs!");
    } else {
      toonToast("Barcode "+barcode+" — vul gegevens aan");
    }
  } catch(e){
    toonToast("Barcode "+barcode+" ingevuld — vul gegevens aan");
  }
}

let toastTimer;
function toonToast(t){
  const el=document.getElementById("toast");
  el.textContent=t;el.classList.add("toon");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("toon"),2800);
}


async function zoekOpCatno(){
  const catno = document.getElementById("f_catno").value.trim();
  if(!catno){toonToast("⚠️ Vul een catalogusnummer in");return;}
  await zoekDiscogsTerm(catno, "catno");
}

async function zoekOpTitel(){
  const artiest = document.getElementById("f_artiest").value.trim();
  const titel   = document.getElementById("f_titel").value.trim();
  if(!artiest && !titel){toonToast("⚠️ Vul artiest of titel in");return;}
  const term = [artiest, titel].filter(Boolean).join(" ");
  await zoekDiscogsTerm(term, "release");
}

async function zoekDiscogsTerm(term, type){
  const el = document.getElementById("catnoResultaten");
  el.innerHTML = '<div style="color:#888;font-size:13px;padding:8px 0;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:14px;height:14px;border:2px solid #555;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite"></span> Zoeken via Discogs…</div>';

  const param = type === "catno" ? `catno=${encodeURIComponent(term)}` : `q=${encodeURIComponent(term)}&type=release`;
  const discogsUrl = `https://api.discogs.com/database/search?${param}&per_page=8`;

  try {
    // Probeer eerst direct, dan via proxy
    let data;
    try {
      const r = await fetch(discogsUrl, {headers:{"User-Agent":"PlatencollectieApp/1.0"}});
      data = await r.json();
    } catch(e) {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(discogsUrl)}`);
      data = await r.json();
    }

    if(!data.results || data.results.length === 0){
      el.innerHTML = `<div style="color:#e74c3c;font-size:13px;padding:8px 0">Geen resultaten voor "<b>${term}</b>"</div>`;
      return;
    }

    window._catnoResultaten = data.results.slice(0,8).map(r => ({
      artiest:    r.title ? r.title.split(" - ")[0].trim() : "",
      titel:      r.title ? r.title.split(" - ").slice(1).join(" - ").trim() : "",
      jaar:       r.year || "",
      land:       r.country || "",
      formaat:    r.format ? r.format[0] : "LP",
      genre:      r.genre ? r.genre[0] : "",
      label:      r.label ? r.label[0] : (type==="catno"?term:""),
      catno:      r.catno || "",
      afbeelding: r.cover_image && !r.cover_image.includes("spacer") ? r.cover_image : (r.thumb||""),
      resource_url: r.resource_url || "",
    }));

    el.innerHTML = `<div style="font-size:11px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${window._catnoResultaten.length} resultaten — kies er een:</div>` +
      window._catnoResultaten.map((r,i) => `
        <div onclick="vulIn(${i})" style="display:flex;align-items:center;gap:10px;background:#1a1a1f;border:1px solid #2a2a2a;border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s"
          onmouseover="this.style.borderColor='#c0392b';this.style.background='#1e1212'"
          onmouseout="this.style.borderColor='#2a2a2a';this.style.background='#1a1a1f'">
          ${r.afbeelding
            ? `<img src="${r.afbeelding}" style="width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
            : `<div style="width:44px;height:44px;border-radius:6px;background:#111;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">🎵</div>`}
          <div style="min-width:0">
            <div style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.artiest}${r.artiest&&r.titel?" — ":""}${r.titel}</div>
            <div style="font-size:11px;color:#888;margin-top:2px">${[r.jaar,r.land,r.formaat,r.catno].filter(Boolean).join(" · ")}</div>
          </div>
        </div>`).join("");
  } catch(e){
    el.innerHTML = `<div style="color:#e74c3c;font-size:13px;padding:8px 0">⚠️ Kon Discogs niet bereiken. Probeer opnieuw.</div>`;
  }
}

function vulIn(idx){
  const r = window._catnoResultaten[idx];
  if(!r) return;
  if(r.artiest)    document.getElementById("f_artiest").value    = r.artiest;
  if(r.titel)      document.getElementById("f_titel").value      = r.titel;
  if(r.jaar)       document.getElementById("f_jaar").value       = r.jaar;
  if(r.genre)      document.getElementById("f_genre").value      = r.genre;
  if(r.land)       document.getElementById("f_land").value       = r.land;
  if(r.label)      document.getElementById("f_label").value      = r.label;
  if(r.catno)      document.getElementById("f_label").value      = (r.label?r.label+" / ":"") + r.catno;
  if(r.afbeelding) document.getElementById("f_afbeelding").value = r.afbeelding;
  const fmtOpts = ["LP","2xLP","EP","Single (7\")","12\" Single","Maxi-Single","Box Set","Overig"];
  const match = fmtOpts.find(f => (r.formaat||"").toLowerCase().includes(f.toLowerCase().replace(/"/g,"")));
  if(match) document.getElementById("f_formaat").value = match;
  document.getElementById("catnoResultaten").innerHTML =
    `<div style="display:flex;align-items:center;gap:10px;background:#0d2b1a;border:1px solid #27ae60;border-radius:10px;padding:10px 12px">
      ${r.afbeelding?`<img src="${r.afbeelding}" style="width:40px;height:40px;border-radius:6px;object-fit:cover">`:""}
      <div style="color:#27ae60;font-size:13px;font-weight:700">✅ Gegevens ingevuld — controleer en pas aan!</div>
    </div>`;
  toonToast("✅ Gegevens en albumhoes ingevuld!");
}


async function zoekWaarde(idx) {
  const p = col[idx];
  const el = document.getElementById("waarde_"+idx);
  if(!el) return;
  el.style.display = "block";
  el.innerHTML = '<div style="color:#888;font-size:12px;padding:6px 0;display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:12px;height:12px;border:2px solid #555;border-top-color:#3498db;border-radius:50%;animation:spin 0.8s linear infinite"></span> Discogs raadplegen…</div>';

  try {
    // Zoek release op Discogs
    const zoekterm = encodeURIComponent((p.artiest||"") + " " + (p.titel||""));
    const zoekUrl = "https://api.discogs.com/database/search?q=" + zoekterm + "&type=release&per_page=5";
    
    let data;
    try {
      const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(zoekUrl));
      data = await r.json();
    } catch(e) {
      throw new Error("Kon Discogs niet bereiken");
    }

    if(!data.results || data.results.length === 0) {
      el.innerHTML = '<div style="color:#e74c3c;font-size:12px;padding:6px 0">Geen resultaten gevonden op Discogs</div>';
      return;
    }

    // Pak beste match
    const release = data.results[0];
    const releaseId = release.id;

    // Haal prijsinformatie op
    const prijsUrl = "https://api.discogs.com/marketplace/price_suggestions/" + releaseId;
    let prijsData;
    try {
      const r2 = await fetch("https://corsproxy.io/?" + encodeURIComponent(prijsUrl));
      prijsData = await r2.json();
    } catch(e) {
      prijsData = null;
    }

    // Haal statistieken op
    const statsUrl = "https://api.discogs.com/releases/" + releaseId + "/stats";
    let statsData;
    try {
      const r3 = await fetch("https://corsproxy.io/?" + encodeURIComponent(statsUrl));
      statsData = await r3.json();
    } catch(e) {
      statsData = null;
    }

    // Bouw waarde weergave
    let html = '<div style="background:#0d1f2b;border:1px solid #2980b9;border-radius:10px;padding:10px 12px">';
    html += '<div style="font-size:11px;color:#3498db;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">💰 Marktwaarde via Discogs</div>';
    
    let gevonden = false;

    if(prijsData && !prijsData.message) {
      const staat_map = {
        "Mint (M)": "Mint",
        "Near Mint (NM)": "Near Mint (NM)",
        "Very Good Plus (VG+)": "Very Good Plus (VG+)",
        "Very Good (VG)": "Very Good (VG)",
        "Good Plus (G+)": "Good Plus (G+)",
        "Good (G)": "Good (G)",
        "Fair (F)": "Fair (F)",
        "Poor (P)": "Poor (P)"
      };
      const staat_key = staat_map[p.staat_vinyl] || "Very Good Plus (VG+)";
      
      // Toon prijzen per staat
      const prijzen = Object.entries(prijsData).slice(0,4);
      if(prijzen.length > 0) {
        gevonden = true;
        prijzen.forEach(([staat, info]) => {
          const prijs = info.value ? "€ " + parseFloat(info.value).toFixed(2) : "–";
          const isHuidige = staat === staat_key;
          html += `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;${isHuidige?"color:#fff;font-weight:700":"color:#aaa"}">
            <span>${staat}</span><span>${prijs}</span>
          </div>`;
        });
      }
    }

    if(!gevonden && statsData) {
      if(statsData.num_for_sale > 0) {
        gevonden = true;
        html += `<div style="font-size:12px;color:#aaa;padding:2px 0">Te koop: ${statsData.num_for_sale} exemplaren</div>`;
        if(statsData.lowest_price) {
          html += `<div style="font-size:14px;color:#fff;font-weight:700;margin-top:4px">Laagste prijs: € ${parseFloat(statsData.lowest_price).toFixed(2)}</div>`;
        }
      }
    }

    if(!gevonden) {
      // Toon link naar Discogs pagina
      const discogsLink = "https://www.discogs.com/release/" + releaseId;
      html += `<div style="font-size:12px;color:#aaa">Geen directe prijsdata beschikbaar.</div>
        <a href="${discogsLink}" target="_blank" style="display:inline-block;margin-top:6px;color:#3498db;font-size:12px;font-weight:700">🔗 Bekijk op Discogs</a>`;
    } else {
      const discogsLink = "https://www.discogs.com/release/" + releaseId;
      html += `<a href="${discogsLink}" target="_blank" onclick="event.stopPropagation()" style="display:inline-block;margin-top:8px;color:#3498db;font-size:11px">🔗 Bekijk op Discogs →</a>`;
    }

    html += '</div>';
    el.innerHTML = html;

  } catch(e) {
    el.innerHTML = '<div style="color:#e74c3c;font-size:12px;padding:6px 0">⚠️ ' + e.message + '</div>';
  }
}
