<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Platen">
<title>Platencollectie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#080808;color:#fff;min-height:100vh}
header{background:#111;position:sticky;top:0;z-index:100;border-bottom:2px solid #c0392b;padding:12px 14px 0}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800}
.logo span{color:#c0392b}
.teller{font-size:12px;color:#d4ac0d;font-weight:700;background:rgba(212,172,13,.12);padding:5px 12px;border-radius:20px;border:1px solid rgba(212,172,13,.25)}
.zoek{position:relative;margin-bottom:8px}
.zoek input{width:100%;padding:11px 40px;background:#1a1a1f;border:1.5px solid #222;border-radius:14px;color:#fff;font-size:16px;outline:none}
.zoek input:focus{border-color:#c0392b}
.zoek input::placeholder{color:#444}
.zoek .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid #222;background:transparent;color:#888}
.chip.on{background:#c0392b;border-color:#c0392b;color:#fff}
.tabs{display:flex}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#555;border-bottom:2px solid transparent}
.tab.on{color:#fff;border-bottom-color:#c0392b}
main{padding:8px 12px 80px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:#111;border:1px solid #222;border-radius:14px;padding:12px;text-align:center}
.stat .n{font-size:22px;font-weight:800}
.stat .l{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.groep{font-size:11px;font-weight:800;color:#444;letter-spacing:1.2px;text-transform:uppercase;padding:12px 2px 5px}
.kaart{background:#111;border-radius:16px;margin-bottom:8px;border:1px solid #222;overflow:hidden;cursor:pointer}
.kaart.open{border-color:#c0392b}
.kaart-top{display:flex;align-items:center;padding:12px 14px;gap:12px}
.thumb{width:52px;height:52px;border-radius:8px;overflow:hidden;background:#0d0d0d;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.thumb img{width:52px;height:52px;object-fit:cover}
.info{flex:1;min-width:0}
.titel{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artiest{font-size:12px;color:#d4ac0d;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
.bj{background:#1e1e24;color:#777}
.bf{background:rgba(192,57,43,.2);color:#e74c3c}
.bla{background:#1e1e24;color:#666}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.detail{display:none;padding:0 14px 14px;border-top:1px solid #1e1e1e}
.kaart.open .detail{display:block}
.groot{margin:0 0 10px;border-radius:12px;overflow:hidden;max-height:200px;text-align:center;background:#0d0d0d}
.groot img{max-width:100%;max-height:200px;object-fit:contain}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dblok{background:#1a1a1f;border-radius:10px;padding:10px 12px}
.dlabel{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.dwaarde{font-size:13px;font-weight:600}
.staat{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.opmerking{background:#1a1a1f;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#aaa;font-style:italic}
.delbtn{width:100%;padding:9px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:10px;color:#e74c3c;font-size:12px;font-weight:700;cursor:pointer}
.leeg{text-align:center;padding:60px 20px;color:#555}
.fveld{margin-bottom:12px}
.flabel{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.finput{width:100%;padding:12px 14px;background:#1a1a1f;border:1.5px solid #222;border-radius:12px;color:#fff;font-size:15px;outline:none;-webkit-appearance:none}
.finput:focus{border-color:#c0392b}
.frij{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opslaan{width:100%;margin-top:8px;padding:15px;background:#c0392b;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;border:1px solid #333}
.toast.aan{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 44 44"><circle cx="22" cy="22" r="21" fill="#0a0a0a" stroke="#333" stroke-width="1.5"/><circle cx="22" cy="22" r="14" fill="#141414"/><circle cx="22" cy="22" r="8" fill="#0a0a0a"/><circle cx="22" cy="22" r="4" fill="#c0392b"/><circle cx="22" cy="22" r="1.5" fill="#0a0a0a"/></svg>
      Platen<span>collectie</span>
    </div>
    <span class="teller" id="teller">148 platen</span>
  </div>
  <div class="zoek">
    <span class="ico">&#128269;</span>
    <input type="text" id="zoekInput" placeholder="Zoek artiest of titel..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="chips" id="chips"></div>
  <div class="tabs">
    <button class="tab on" onclick="toonTab('collectie',this)">&#127925; Collectie</button>
    <button class="tab" onclick="toonTab('toevoegen',this)">+ Toevoegen</button>
  </div>
</header>

<main>
  <div id="collectie">
    <div class="stats" id="statsBar"></div>
    <div id="lijst"></div>
  </div>
  <div id="toevoegen" style="display:none;padding-top:8px">
    <div class="frij">
      <div class="fveld"><label class="flabel">Artiest *</label><input class="finput" id="fa" placeholder="Pink Floyd"></div>
      <div class="fveld"><label class="flabel">Jaar</label><input class="finput" id="fj" type="number" placeholder="1979"></div>
    </div>
    <div class="fveld"><label class="flabel">Titel *</label><input class="finput" id="ft" placeholder="The Wall"></div>
    <div class="frij">
      <div class="fveld"><label class="flabel">Formaat</label>
        <select class="finput" id="ff"><option>LP</option><option>2xLP</option><option>EP</option><option>Single (7")</option><option>12" Single</option><option>Maxi-Single</option><option>Box Set</option><option>Overig</option></select>
      </div>
      <div class="fveld"><label class="flabel">Genre</label><input class="finput" id="fg" placeholder="Rock"></div>
    </div>
    <div class="frij">
      <div class="fveld"><label class="flabel">Staat Vinyl</label>
        <select class="finput" id="fsv"><option>Mint (M)</option><option>Near Mint (NM)</option><option selected>Very Good Plus (VG+)</option><option>Very Good (VG)</option><option>Good Plus (G+)</option><option>Good (G)</option><option>Fair (F)</option><option>Poor (P)</option></select>
      </div>
      <div class="fveld"><label class="flabel">Staat Hoes</label>
        <select class="finput" id="fsh"><option>Mint (M)</option><option>Near Mint (NM)</option><option selected>Very Good Plus (VG+)</option><option>Very Good (VG)</option><option>Good Plus (G+)</option><option>Good (G)</option><option>Fair (F)</option><option>Poor (P)</option></select>
      </div>
    </div>
    <div class="frij">
      <div class="fveld"><label class="flabel">Label / Nr.</label><input class="finput" id="fl" placeholder="EMI / EMC 3223"></div>
      <div class="fveld"><label class="flabel">Land</label><input class="finput" id="fla" placeholder="UK"></div>
    </div>
    <div class="fveld">
      <label class="flabel">Afbeelding URL</label>
      <input class="finput" id="fafb" placeholder="https://i.discogs.com/...">
      <div style="font-size:11px;color:#555;margin-top:4px">Ga naar discogs.com, zoek de plaat, kopieer de afbeeldingslink</div>
    </div>
    <div class="fveld"><label class="flabel">Opmerkingen</label><input class="finput" id="fo"></div>
    <button class="opslaan" onclick="plaatOpslaan()">Toevoegen</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var INIT = JSON.parse(document.getElementById('data-json').textContent);
var SKEY = 'platen_v10';
var col = [], zoek = '', filter = '', openId = null;

var ST = {
  'Mint (M)':{k:'#2ecc71',bg:'rgba(46,204,113,.12)'},
  'Near Mint (NM)':{k:'#27ae60',bg:'rgba(39,174,96,.12)'},
  'Very Good Plus (VG+)':{k:'#3498db',bg:'rgba(52,152,219,.12)'},
  'Very Good (VG)':{k:'#e67e22',bg:'rgba(230,126,34,.12)'},
  'Good Plus (G+)':{k:'#e74c3c',bg:'rgba(231,76,60,.12)'},
  'Good (G)':{k:'#c0392b',bg:'rgba(192,57,43,.12)'},
  'Fair (F)':{k:'#922b21',bg:'rgba(146,43,33,.12)'},
  'Poor (P)':{k:'#641e16',bg:'rgba(100,30,22,.12)'}
};
function si(s){return ST[s]||{k:'#555',bg:'rgba(85,85,85,.12)'};}

function laad(){
  try{var d=localStorage.getItem(SKEY);col=d?JSON.parse(d):INIT.map(function(i){return Object.assign({},i);});}
  catch(e){col=INIT.map(function(i){return Object.assign({},i);});}
}
function sla(){try{localStorage.setItem(SKEY,JSON.stringify(col));}catch(e){}}

function render(){
  var q=zoek.toLowerCase();
  var gef=col.filter(function(p){
    return(!q||p.artiest.toLowerCase().indexOf(q)>-1||p.titel.toLowerCase().indexOf(q)>-1||(p.genre||'').toLowerCase().indexOf(q)>-1)&&(!filter||p.artiest===filter);
  });
  document.getElementById('teller').textContent=(zoek||filter)?gef.length+'/'+col.length+' platen':col.length+' platen';
  var nm=col.filter(function(p){return p.staat_vinyl==='Near Mint (NM)'||p.staat_vinyl==='Mint (M)';}).length;
  var vgp=col.filter(function(p){return p.staat_vinyl==='Very Good Plus (VG+)';}).length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="n">'+col.length+'</div><div class="l">Platen</div></div>'+
    '<div class="stat"><div class="n" style="color:#27ae60">'+nm+'</div><div class="l">NM of beter</div></div>'+
    '<div class="stat"><div class="n" style="color:#3498db">'+vgp+'</div><div class="l">VG+</div></div>';
  var tels={};col.forEach(function(p){tels[p.artiest]=(tels[p.artiest]||0)+1;});
  var tops=Object.keys(tels).filter(function(a){return tels[a]>1;}).sort(function(a,b){return a.localeCompare(b);});
  var ch='<button class="chip'+(filter?'':' on')+'" onclick="setF(null)">Alle</button>';
  tops.forEach(function(a){ch+='<button class="chip'+(filter===a?' on':'')+'" data-v="'+encodeURIComponent(a)+'" onclick="setF2(this)">'+a.split(' ')[0]+' '+tels[a]+'</button>';});
  document.getElementById('chips').innerHTML=ch;
  if(!gef.length){document.getElementById('lijst').innerHTML='<div class="leeg"><div style="font-size:48px;margin-bottom:12px">&#127925;</div><p>Geen platen gevonden</p></div>';return;}
  var gr={};gef.forEach(function(p){if(!gr[p.artiest])gr[p.artiest]=[];gr[p.artiest].push(p);});
  var arr=Object.keys(gr).sort(function(a,b){return a.localeCompare(b);});
  var h='';
  arr.forEach(function(art){
    h+='<div class="groep">'+art+' <span style="color:#333">'+gr[art].length+'</span></div>';
    gr[art].forEach(function(p){
      var idx=col.indexOf(p);var id='k'+idx;var isOp=(openId===id);var info=si(p.staat_vinyl);
      var vinyl='<svg viewBox="0 0 52 52" width="52" height="52"><circle cx="26" cy="26" r="25" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/><circle cx="26" cy="26" r="19" fill="#141414"/><circle cx="26" cy="26" r="13" fill="#0d0d0d"/><circle cx="26" cy="26" r="7" fill="#161616"/><circle cx="26" cy="26" r="4" fill="'+info.k+'" opacity=".9"/><circle cx="26" cy="26" r="1.8" fill="#0d0d0d"/></svg>';
      h+='<div class="kaart'+(isOp?' open':'')+'" id="'+id+'" data-id="'+id+'" onclick="tog(this.dataset.id)">';
      h+='<div class="kaart-top">';
      h+='<div class="thumb">'+(p.afbeelding?'<img src="'+p.afbeelding+'" onerror="this.parentElement.innerHTML=String.fromCodePoint(127925)">':vinyl)+'</div>';
      h+='<div class="info"><div class="titel">'+p.titel+'</div><div class="artiest">'+p.artiest+'</div>';
      h+='<div class="badges">'+(p.jaar?'<span class="badge bj">'+p.jaar+'</span>':'')+'<span class="badge bf">'+(p.formaat||'LP')+'</span>'+(p.land?'<span class="badge bla">'+p.land+'</span>':'')+'</div></div>';
      h+='<div class="dot" style="background:'+info.k+'"></div></div>';
      if(isOp){
        h+='<div class="detail">';
        if(p.afbeelding)h+='<div class="groot"><img src="'+p.afbeelding+'" onerror="this.parentElement.style.display=String.fromCharCode(110,111,110,101)"></div>';
        h+='<div class="dgrid">';
        if(p.staat_vinyl)h+='<div class="dblok"><div class="dlabel">Staat Vinyl</div><span class="staat" style="color:'+si(p.staat_vinyl).k+';background:'+si(p.staat_vinyl).bg+'">'+p.staat_vinyl+'</span></div>';
        if(p.staat_hoes)h+='<div class="dblok"><div class="dlabel">Staat Hoes</div><span class="staat" style="color:'+si(p.staat_hoes).k+';background:'+si(p.staat_hoes).bg+'">'+p.staat_hoes+'</span></div>';
        if(p.label)h+='<div class="dblok"><div class="dlabel">Label / Nr.</div><div class="dwaarde" style="font-size:12px">'+p.label+'</div></div>';
        if(p.genre)h+='<div class="dblok"><div class="dlabel">Genre</div><div class="dwaarde">'+p.genre+'</div></div>';
        if(p.barcode)h+='<div class="dblok"><div class="dlabel">Barcode</div><div class="dwaarde" style="font-size:11px;font-family:monospace">'+p.barcode+'</div></div>';
        if(p.land)h+='<div class="dblok"><div class="dlabel">Land</div><div class="dwaarde">'+p.land+'</div></div>';
        h+='</div>';
        if(p.opmerkingen)h+='<div class="opmerking">'+p.opmerkingen+'</div>';
        h+='<button class="delbtn" onclick="event.stopPropagation();del('+idx+')">Verwijderen</button>';
        h+='</div>';
      }
      h+='</div>';
    });
  });
  document.getElementById('lijst').innerHTML=h;
}

function tog(id){
  if(openId&&openId!==id){var p=document.getElementById(openId);if(p)p.classList.remove('open');}
  var el=document.getElementById(id);if(!el)return;
  el.classList.toggle('open');openId=el.classList.contains('open')?id:null;render();
  if(openId)setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}
function setF(a){filter=a||'';render();}
function setF2(btn){filter=decodeURIComponent(btn.getAttribute('data-v'));render();}
document.getElementById('zoekInput').addEventListener('input',function(){zoek=this.value;filter='';render();});
function toonTab(id,btn){
  document.querySelectorAll('main > div').forEach(function(d){d.style.display='none';});
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');if(id==='collectie')render();
}
function plaatOpslaan(){
  var a=document.getElementById('fa').value.trim();var t=document.getElementById('ft').value.trim();
  if(!a||!t){showToast('Artiest en titel zijn verplicht');return;}
  col.push({artiest:a,titel:t,jaar:parseInt(document.getElementById('fj').value)||null,
    label:document.getElementById('fl').value.trim(),barcode:'',
    staat_vinyl:document.getElementById('fsv').value,staat_hoes:document.getElementById('fsh').value,
    formaat:document.getElementById('ff').value,genre:document.getElementById('fg').value.trim(),
    land:document.getElementById('fla').value.trim(),opmerkingen:document.getElementById('fo').value.trim(),
    afbeelding:document.getElementById('fafb').value.trim()});
  sla();showToast('Toegevoegd: '+a+' - '+t);
  ['fa','ft','fj','fl','fg','fla','fo','fafb'].forEach(function(id){document.getElementById(id).value='';});
  document.querySelector('.tab[onclick*="collectie"]').click();
}
function del(idx){
  if(!confirm('Verwijder?'))return;
  col.splice(idx,1);sla();openId=null;showToast('Verwijderd');render();
}
var tt;
function showToast(t){var el=document.getElementById('toast');el.textContent=t;el.classList.add('aan');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('aan');},2800);}
laad();render();
</script>
</body>
</html>
